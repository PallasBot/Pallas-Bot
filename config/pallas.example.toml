# 复制为 config/pallas.toml 后填写（勿提交密钥）。
# 插件与通用项在 WebUI 保存 → data/pallas_config/webui.json（优先级最高）。
# 说明：docs/developer/architecture/config-storage.md · 从旧 .env 迁移：uv run python tools/migrate_env_to_pallas.py

# ── 最少配置（改 superusers + 数据库即可启动）────────────────────────
[bootstrap]
host = "0.0.0.0"
port = 8088
superusers = ["你的QQ号"]
# 新装默认 PostgreSQL；从 3.x MongoDB 升级请改为 mongodb 并改用 [bootstrap.mongo]
db_backend = "postgresql"

[bootstrap.postgres]
host = "127.0.0.1"   # docker-compose.full.yml 容器内为 postgres
port = 5432
user = "pallas"
password = "pallas"
db = "PallasBot"
# auto_create_db = true   # 仅本地：库不存在时 CREATE DATABASE（需 CREATEDB；Compose/托管勿开）

# [bootstrap.mongo]  # 3.x 升级沿用 Mongo 时取消注释，并设 db_backend = "mongodb"
# host = "127.0.0.1"   # 根目录 docker-compose.yml 容器内为 mongodb
# port = 27017
# db = "PallasBot"
# user / password / auth_source 有认证时再填

# ── 按需取消注释 ────────────────────────────────────────────────────
# log_level = "INFO"
# access_token = ""              # 公网暴露 HTTP 时建议设置
# extra_plugin_dirs = ["local/plugins"]   # 未配置时，local/plugins 有有效插件包会自动纳入
# load_bundled_extra_plugins = "auto"      # true | false | auto（默认 auto：pip 未装时用仓库内副本）

# [env]
# LLM 聊天默认 bot_kernel：配置 Provider 后开 LLM_CHAT_ENABLED 即可，无需 AI Runtime / 9099
# LLM_RUNTIME = "bot_kernel"          # 或 ai_service（旧路径，依赖下方 AI_SERVER_*）
# LLM_BASE_URL = "http://127.0.0.1:11434/v1"   # 兼容 LLM_REMOTE_BASE_URL
# LLM_API_KEY = ""                    # 兼容 LLM_REMOTE_API_KEY；Ollama 可空
# LLM_MODEL = "qwen2.5:7b"            # 兼容 LLM_REMOTE_MODEL
# AI_SERVER_HOST = "127.0.0.1"   # 媒体 / ai_service 路径；全栈 Docker 由 compose 注入 pallasbot-ai
# AI_SERVER_PORT = "9099"
# AI 扩展连接（WebUI 保存 → data/pb_webui/ai_extension.json；示例见 config/ai_extension.example.json）
# 「AI 服务」Bearer Token 须与 Pallas-Bot-AI 的 PALLAS_AI_API_TOKEN 一致，否则运维日志 HTTP 拉取会 401。
# LLM_CHAT_ENABLED = "true"
# REDIS_URL = "redis://127.0.0.1:6379/0"   # 分片多进程 claim；需 uv sync --extra coord-redis
# PALLAS_DUPLICATE_PREFIX_STRICT = "true"  # 生产推荐：重复命令 prefix 冲突时阻断启动

# [community_stats]
# enabled = false                # 默认开启；仅关闭上报时取消注释

# 多机协同、语料联邦、PG 连接池等进阶项见 docs/Config.md，一般无需写进 pallas.toml。
