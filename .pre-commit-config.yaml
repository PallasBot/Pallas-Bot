# 避免 pre-commit 触碰本地敏感配置文件。
exclude: ^\.env$

# 不启用 pre-commit.ci 自动升级 hooks（需 org 安装 App；本仓改为手动更新）。
# 若日后启用 pre-commit.ci，请把 skip 等写回本文件的 ci: 段（勿再用单独 .pre-commit-ci.yaml）。

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # 基础仓库卫生检查继续覆盖全仓。
      # 默认 500KB；帮助页立绘等 PNG 常更大，仍用于拦截误提交超大二进制
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.4
    hooks:
      - id: ruff
        # Python 代码质量检查覆盖 pallas/、packages/、local/plugins/
        files: ^(pallas|packages|local/plugins)/
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        # 代码格式化覆盖 pallas/、packages/、local/plugins/
        files: ^(pallas|packages|local/plugins)/

  - repo: local
    hooks:
      - id: check-plugin-imports
        name: 检查插件 import 规则
        description: "local/plugins 仅允许 pallas.api.*；packages 禁止 src.*"
        entry: python3 tools/check_plugin_imports.py
        language: system
        pass_filenames: false
        always_run: true
        verbose: true
      - id: check-plugin-identity-imports
        name: 检查插件身份路径漂移
        description: "主仓业务代码不得直接把 extra 插件模块路径当业务真相"
        entry: python3 tools/check_plugin_identity_imports.py
        language: system
        files: ^(pallas|packages|tests|tools)/
        pass_filenames: true
        verbose: true
      - id: sync-console-openapi
        name: 同步控制台 OpenAPI
        description: "导出 openspec；同级有 WebUI 仓时一并 gen 类型"
        entry: uv run python tools/sync_console_openapi.py --pre-commit
        language: system
        files: ^(packages/pb_webui/|tools/(export_pb_webui_openapi|sync_console_openapi|check_console_openapi_drift)\.py|openspec/pallas-console-v1\.json)
        pass_filenames: false
        verbose: true
